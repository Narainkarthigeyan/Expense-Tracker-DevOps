services:
  mysql:
    image: mysql:8.0
    container_name: finops-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: finops
    ports:
      - "3307:3306"
    networks:
      - finops-network
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  auth-service:
    build: ./services/auth-service
    container_name: finops-auth-service
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/finops?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - finops-network
    restart: on-failure

  expense-service:
    build: ./services/expense-service
    container_name: finops-expense-service
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/finops?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - finops-network
    restart: on-failure

  budget-service:
    build: ./services/budget-service
    container_name: finops-budget-service
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/finops?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - finops-network
    restart: on-failure

  analytics-service:
    build: ./services/analytics-service
    container_name: finops-analytics-service
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/finops?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - finops-network
    restart: on-failure

  api-gateway:
    build: ./api-gateway
    container_name: finops-api-gateway
    ports:
      - "8000:8080"
    depends_on:
      - auth-service
      - expense-service
      - budget-service
      - analytics-service
    networks:
      - finops-network
    restart: on-failure

  frontend:
    build: ./frontend
    container_name: finops-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - finops-network

networks:
  finops-network:
    driver: bridge

volumes:
  mysql-data:
