name: FinOps AI CI Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:

  build-backend:
    name: Build Backend Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Auth Service
        run: mvn clean package -DskipTests
        working-directory: services/auth-service

      - name: Build Expense Service
        run: mvn clean package -DskipTests
        working-directory: services/expense-service

      - name: Build Budget Service
        run: mvn clean package -DskipTests
        working-directory: services/budget-service

      - name: Build Analytics Service
        run: mvn clean package -DskipTests
        working-directory: services/analytics-service

      - name: Build API Gateway
        run: mvn clean package -DskipTests
        working-directory: api-gateway

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Frontend
        run: npm run build
        working-directory: frontend

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    needs:
      - build-backend
      - build-frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Auth Service Docker Image
        run: docker build -t finops-auth-service:latest ./services/auth-service

      - name: Build Expense Service Docker Image
        run: docker build -t finops-expense-service:latest ./services/expense-service

      - name: Build Budget Service Docker Image
        run: docker build -t finops-budget-service:latest ./services/budget-service

      - name: Build Analytics Service Docker Image
        run: docker build -t finops-analytics-service:latest ./services/analytics-service

      - name: Build API Gateway Docker Image
        run: docker build -t finops-api-gateway:latest ./api-gateway

      - name: Build Frontend Docker Image
        run: docker build -t finops-frontend:latest ./frontend

      - name: Verify Docker Images
        run: docker images | grep finops